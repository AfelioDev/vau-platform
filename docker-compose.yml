
networks:
  validarauto-network:
    driver: bridge
    name: validarauto-network

volumes:
  postgres-data:
  redis-data:
  zookeeper-data:
  kafka-data:

services:

  # ─── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: validarauto-postgres
    environment:
      POSTGRES_DB: validarauto
      POSTGRES_USER: validarauto
      POSTGRES_PASSWORD: validarauto123
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - validarauto-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U validarauto -d validarauto"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: validarauto-redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - validarauto-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: validarauto-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    ports:
      - "2181:2181"
    networks:
      - validarauto-network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | timeout 2 bash -c 'cat < /dev/null > /dev/tcp/localhost/2181'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: validarauto-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "9092:9092"
    networks:
      - validarauto-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ─── Microservices ────────────────────────────────────────────────────────────
  # Cada servicio se construye desde su propio repositorio (context apunta al repo hermano).
  # Antes de `docker compose build`, ejecutar `mvn package -DskipTests` en cada repo.

  auth-service:
    build:
      context: ../validarauto-auth
    container_name: validarauto-auth
    image: validarauto/auth-service:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: validarauto
      DB_USER: validarauto
      DB_PASSWORD: validarauto123
      JWT_SECRET: ${JWT_SECRET:-validarauto-super-secret-key-that-is-at-least-256-bits-long-for-hs256}
    ports:
      - "8081:8081"
    networks:
      - validarauto-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  repuve-service:
    build:
      context: ../validarauto-repuve
    container_name: validarauto-repuve
    image: validarauto/repuve-service:latest
    environment:
      SPRING_PROFILES_ACTIVE: docker
      PLACAS_TOKEN: ${PLACAS_TOKEN:-fd0ac84a055a8dd481d1bef7c48b41d59cfdf079}
      REPUVE_API_URL: ${REPUVE_API_URL:-}
      REPUVE_API_KEY: ${REPUVE_API_KEY:-}
    ports:
      - "8083:8083"
    networks:
      - validarauto-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  adeudos-service:
    build:
      context: ../validarauto-adeudos
    container_name: validarauto-adeudos
    image: validarauto/adeudos-service:latest
    environment:
      SPRING_PROFILES_ACTIVE: docker
      ADEUDOS_API_URL: ${ADEUDOS_API_URL:-}
      ADEUDOS_API_KEY: ${ADEUDOS_API_KEY:-}
    ports:
      - "8084:8084"
    networks:
      - validarauto-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  reporte-service:
    build:
      context: ../validarauto-reporte
    container_name: validarauto-reporte
    image: validarauto/reporte-service:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      repuve-service:
        condition: service_healthy
      adeudos-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: validarauto
      DB_USER: validarauto
      DB_PASSWORD: validarauto123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET:-validarauto-super-secret-key-that-is-at-least-256-bits-long-for-hs256}
      REPUVE_SERVICE_URL: http://repuve-service:8083
      ADEUDOS_SERVICE_URL: http://adeudos-service:8084
    ports:
      - "8082:8082"
    networks:
      - validarauto-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  gateway-service:
    build:
      context: ../validarauto-gateway
    container_name: validarauto-gateway
    image: validarauto/gateway-service:latest
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      reporte-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-validarauto-super-secret-key-that-is-at-least-256-bits-long-for-hs256}
      JWT_ISSUER_URI: http://auth-service:8081
      JWT_JWK_SET_URI: http://auth-service:8081/api/auth/.well-known/jwks.json
    ports:
      - "8080:8080"
    networks:
      - validarauto-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped
